<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muncel - Registro de Cliente</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>

<body>

    <nav class="navbar">
        <div class="nav-logo">MUNDO CELULAR</div>
    </nav>

    <div class="contenedor-principal">

        <div class="registro-centrado">
            <div class="card-acceso card-registro">
                <div class="acceso-header">
                    <h2>CREA TU CUENTA</h2>
                    <p>Regístrate para comprar accesorios y revisar tus órdenes técnicas</p>
                </div>

                <div th:if="${error}" class="alert-error" style="color: red; padding: 10px;" th:text="${error}"></div>

                <form th:action="@{/registro}" method="POST">

                    <div class="separador-registro">Datos Personales</div>

                    <div class="grupo-campo">
                        <label for="cedula">Cédula o RUC</label>
                        <input type="text" id="cedula" name="cedulaRuc" placeholder="Ej: 1712345678" required
                            onblur="buscarClienteExistente()">
                        <small id="mensajeCedula" style="color: green; font-size: 0.8em;"></small>
                    </div>

                    <div class="grupo-campo">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombreCompleto" placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="fila-campos">
                        <div class="col-mitad">
                            <div class="grupo-campo">
                                <label for="telefono">Teléfono</label>
                                <input type="text" id="telefono" name="telefono" placeholder="Ej: 0998765432" required>
                            </div>
                        </div>
                        <div class="col-mitad">
                            <div class="grupo-campo">
                                <label for="correo">Correo Electrónico</label>
                                <input type="email" id="correo" name="correo" placeholder="ejemplo@gmail.com" required>
                            </div>
                        </div>
                    </div>

                    <div class="separador-registro">Credenciales de Acceso</div>

                    <div class="fila-campos">
                        <div class="col-mitad">
                            <div class="grupo-campo">
                                <label for="username">Nombre de Usuario</label>
                                <input type="text" id="username" name="username" placeholder="Ej: juan.perez" required>
                            </div>
                        </div>
                        <div class="col-mitad">
                            <div class="grupo-campo">
                                <label for="password">Contraseña</label>
                                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres"
                                    required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-acceso-submit" style="margin-top: 25px;">
                        Finalizar Registro
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function buscarClienteExistente() {
            const cedula = document.getElementById('cedula').value;
            const mensaje = document.getElementById('mensajeCedula');
            const inputNombre = document.getElementById('nombre');
            const inputTelefono = document.getElementById('telefono');

            if (cedula.length >= 10) {
                fetch(`/api/clientes/buscar?cedula=${cedula}`)
                    .then(response => {
                        if (response.ok) return response.json();
                        throw new Error("No encontrado");
                    })
                    .then(data => {
                        // Si existe, llenamos y bloqueamos (readonly) para proteger la data
                        inputNombre.value = data.nombreCompleto || data.nombre || "";
                        inputNombre.readOnly = true;
                        inputNombre.style.backgroundColor = "#e9ecef";

                        inputTelefono.value = data.telefono || "";
                        inputTelefono.readOnly = true;
                        inputTelefono.style.backgroundColor = "#e9ecef";

                        mensaje.textContent = "¡Te encontramos! Completa los datos restantes.";
                    })
                    .catch(error => {
                        // Si es nuevo, dejamos que escriba libremente
                        inputNombre.readOnly = false;
                        inputNombre.style.backgroundColor = "white";
                        inputTelefono.readOnly = false;
                        inputTelefono.style.backgroundColor = "white";
                        mensaje.textContent = "";
                    });
            }
        }
    </script>
</body>

</html>
