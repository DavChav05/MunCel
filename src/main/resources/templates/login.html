<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muncel - Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>

<body class="bg-login">

    <div class="login-wrapper">
        <div class="card-acceso">
            <div class="acceso-header">
                <h2>MUNCEL</h2>
                <p>Accede a tu cuenta para gestionar tus compras o servicios</p>
            </div>

            <div th:if="${param.error}" class="alert-error-login">
                Usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert-success-login">
                Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/ingresar}" method="POST">
                <div class="grupo-campo">
                    <label for="username">Nombre de Usuario / Email</label>
                    <input type="text" id="username" name="username" placeholder="ejemplo123" required autofocus>
                </div>

                <div class="grupo-campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="botones-acciones-login">
                    <a th:href="@{/}" class="btn-regresar-inicio">Volver al Inicio</a>

                    <button type="submit" class="btn-acceso-submit">Ingresar</button>
                </div>
            </form>

            <div class="acceso-footer">
                <p>¿No tienes una cuenta aún?</p>
                <a th:href="@{/registro}">Regístrate aquí como Cliente</a>
            </div>
        </div>
    </div>

</body>

</html>
